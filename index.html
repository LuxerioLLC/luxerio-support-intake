<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luxerio Support 導入相談</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <header class="masthead">
      <div class="mark" aria-hidden="true"><img src="./luxerio-logo-white.png" alt=""></div>
      <div>
        <h1>Luxerio Support 導入相談</h1>
        <p class="lead">ご相談内容に合わせて、POSまたはシフト管理の専用フォームへお進みください。</p>
      </div>
    </header>

    <div class="panel">
      <div class="choice-area">
        <h2>相談内容を選択</h2>
        <div class="choice-grid">
          <a class="choice-card" href="./pos.html">
            <strong>POS導入相談</strong>
            <span>現在のPOS、決済会社、決済手数料、売上管理、店舗別の運用情報を確認します。</span>
            <b>POSフォームへ</b>
          </a>
          <a class="choice-card" href="./shift.html">
            <strong>シフト管理導入相談</strong>
            <span>現在の作成方法、スタッフ・キャスト人数、希望提出、勤怠・給与連携の状況を確認します。</span>
            <b>シフトフォームへ</b>
          </a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
