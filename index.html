<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POS・シフト管理 先行相談 | Luxerio</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <header class="masthead">
      <a class="brand" href="./index.html" aria-label="Luxerio">
        <img src="./luxerio-logo-color-cropped.png" alt="Luxerio">
      </a>
      <div class="masthead-copy">
        <p class="eyebrow">Luxerio Support</p>
        <h1>POS・シフト管理の先行相談</h1>
        <p class="lead">開発中サービスのご案内・個別相談に向けて、現在の状況をお聞かせください。</p>
        <div class="meta-row" aria-label="入力目安">
          <span>入力目安 2分</span>
          <span>通常1営業日以内に返信</span>
          <span>相談無料</span>
        </div>
      </div>
    </header>

    <section class="intro-panel" aria-labelledby="select-title">
      <div class="section-head">
        <p class="eyebrow">Select</p>
        <h2 id="select-title">相談内容を選択してください</h2>
        <p>POSとシフト管理では確認したい内容が異なるため、フォームを分けています。</p>
      </div>

      <div class="choice-grid">
        <a class="choice-card" href="./pos.html">
          <span class="choice-kicker">POS / Payment</span>
          <strong>POS・決済手数料の先行相談</strong>
          <span>現在のPOS、決済会社、手数料、店舗別の運用状況を確認します。</span>
          <b>POS相談へ</b>
        </a>
        <a class="choice-card" href="./shift.html">
          <span class="choice-kicker">Shift / Workforce</span>
          <strong>シフト管理アプリの先行相談</strong>
          <span>現在の作成方法、希望回収、勤怠・給与連携、店舗別人数を確認します。</span>
          <b>シフト相談へ</b>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
